apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: aws/s3_lifecycle
  version: v1.0.0
spec:
  source: aws
  description: |
    S3 bucket lifecycle rules + Object Lock retention, with tags. From the aws
    plugin collectS3Lifecycle (ListBuckets + GetBucketLifecycleConfiguration +
    GetObjectLockConfiguration + GetBucketTagging): { fetched_at, buckets:[{name,
    tags, lifecycle:{enabled, rules:[{id, expiration_days}]},
    object_lock:{enabled, default_retention_days}}] }.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    required: [buckets]
    properties:
      fetched_at: {type: string}
      buckets:
        type: array
        items:
          type: object
          required: [name, lifecycle]
          properties:
            name: {type: string}
            tags: {type: object}
            lifecycle: {type: object}
            object_lock: {type: object}
          additionalProperties: true
    additionalProperties: true
