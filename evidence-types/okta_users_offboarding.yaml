apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: okta/users_offboarding
  version: v1.0.0
spec:
  source: okta
  description: |
    Okta users filtered to SUSPENDED/DEPROVISIONED (offboarding view), from the
    okta plugin collectUsers: { fetched_at, org_url, users: [ { id, email,
    status, has_strong_mfa, ... } ] } — same row shape as users_mfa.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    required: [users]
    properties:
      fetched_at: {type: string}
      org_url: {type: string}
      users:
        type: array
        items: {type: object}
    additionalProperties: true
