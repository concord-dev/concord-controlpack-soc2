apiVersion: concord.dev/v1
kind: Control

metadata:
  id: SOC2-CC4.1
  name: monitoring-strategy-documented
  title: A documented monitoring strategy describes alerts, owners, and review cadence
  framework: soc2
  category: Monitoring Activities
  severity: high
  tags:
    - monitoring
    - observability
    - alerting
  owners:
    - team: platform

spec:
  description: |
    SOC 2 CC4.1 requires the organization to select, develop, and
    perform ongoing evaluations of its controls. Concord enforces the
    operational artifact: a Git-tracked monitoring strategy doc that
    declares what is monitored, who owns each alert class, the review
    cadence, and how alert quality is measured (false-positive rate,
    mean-time-to-acknowledge).

  rationale: |
    "We have monitoring" is not evidence. A strategy doc forces three
    questions auditors care about: (1) is everything important
    monitored, (2) are alerts routed to humans who can act on them,
    (3) is alert quality reviewed so monitoring stays effective rather
    than becoming background noise.

  evidence:
    - id: monitoring_strategy
      source: github
      type: file_glob
      fixture: ../tests/fixtures/cc4.1-monitoring-pass.json
      params:
        repo: ${env.CONCORD_REPO}
        paths:
          - "docs/monitoring/*.md"
        parse: frontmatter

  policy:
    engine: rego
    package: concord.soc2.cc4_1
    file: ../policies/cc4_1.rego

  remediation:
    runbook: docs/remediation/soc2-cc4.1.md
    auto_fix: false
    estimated_effort: 1d

  mappings:
    iso27001:
      - "A.8.16"
    nist_csf:
      - "DE.CM-1"
      - "DE.AE-2"
      - "DE.DP-5"
    nist_800_53:
      - "CA-7"
      - "AU-6"

  status: stable
  blocking: true
