apiVersion: concord.dev/v1
kind: Control

metadata:
  id: SOC2-CC3.1
  name: risk-assessment-process-documented
  title: A risk-assessment methodology is documented with owner, cadence, and last review
  framework: soc2
  category: Risk Assessment
  severity: high
  tags:
    - risk-assessment
    - methodology
    - governance
  owners:
    - team: security

spec:
  description: |
    SOC 2 CC3.1 requires the organization to specify objectives with
    sufficient clarity to enable the identification and assessment of
    risks. Concord enforces a documented methodology at
    docs/policies/risk-assessment-process.md describing the process
    owner, methodology (qualitative / quantitative / hybrid), review
    cadence, and last review date. This methodology is what the risk
    register (CC9.2) is *output of* — auditors check both the artifact
    and the process that produces it.

  rationale: |
    A risk register without a documented process behind it is
    suspicious to an auditor — it suggests risks were enumerated
    once and never re-evaluated as the system, threat model, or
    organization changed. Forcing the methodology to be a versioned
    artifact ensures the process gets reviewed alongside the
    register itself.

  evidence:
    - id: risk_process
      source: github
      type: file_glob
      fixture: ../tests/fixtures/cc3.1-process-pass.json
      params:
        repo: ${env.CONCORD_REPO}
        paths:
          - "docs/policies/risk-assessment-process.md"
        parse: frontmatter

  policy:
    engine: rego
    package: concord.soc2.cc3_1
    file: ../policies/cc3_1.rego

  remediation:
    runbook: docs/remediation/soc2-cc3.1.md
    auto_fix: false
    estimated_effort: 1d

  mappings:
    iso27001:
      - "A.5.4"
      - "A.5.7"
    nist_csf:
      - "ID.RA-1"
      - "ID.RA-3"
      - "ID.RM-1"
    nist_800_53:
      - "RA-1"
      - "RA-3"
      - "PM-9"

  status: stable
  blocking: true
