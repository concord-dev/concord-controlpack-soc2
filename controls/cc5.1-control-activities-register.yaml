apiVersion: concord.dev/v1
kind: Control

metadata:
  id: SOC2-CC5.1
  name: control-activities-register
  title: A control-activities register documents each implemented control with owner and review status
  framework: soc2
  category: Control Activities
  severity: high
  tags:
    - controls
    - governance
  owners:
    - team: security

spec:
  description: |
    SOC 2 CC5.1 requires the organization to select and develop control
    activities that contribute to the mitigation of risks. Concord
    enforces a register of those activities: one markdown file per
    activity at docs/control-activities/<name>.md, declaring control_id
    (mapping to a SOC 2 / ISO 27001 / NIST control), owner, status
    (implemented, planned, ad_hoc, deprecated), and last_audited_at.

  rationale: |
    The register is the gap-analysis tool an auditor uses to scope an
    engagement. Without it, the conversation degenerates to "what
    controls do you have?" — and the answer is invariably "let me get
    back to you." A Git-tracked register makes that question
    answerable in 30 seconds and provides immediate evidence for
    every other CC question.

  evidence:
    - id: control_register
      source: github
      type: file_glob
      fixture: ../tests/fixtures/cc5.1-register-pass.json
      params:
        repo: ${env.CONCORD_REPO}
        paths:
          - "docs/control-activities/*.md"
        parse: frontmatter

  policy:
    engine: rego
    package: concord.soc2.cc5_1
    file: ../policies/cc5_1.rego

  remediation:
    runbook: docs/remediation/soc2-cc5.1.md
    auto_fix: false
    estimated_effort: 1w

  mappings:
    iso27001:
      - "A.5.7"
      - "A.5.36"
    nist_csf:
      - "GV.PO-1"
      - "ID.GV-1"
    nist_800_53:
      - "CM-1"
      - "PM-9"

  status: stable
  blocking: true
